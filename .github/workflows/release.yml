name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  release-macos:
    name: Build and Release (macOS)
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION is $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS)
        shell: bash
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== macOS build attempt ${attempt}/${max_attempts} ==="
            if pnpm tauri build; then
              echo "✅ macOS build succeeded"
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ macOS build failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "⚠️ macOS build failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Prepare macOS Assets
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          ARCH="aarch64"

          # Recursively search for artifacts
          BUNDLE_DIR=$(find src-tauri/target -name "bundle" -type d | head -1 || true)

          if [ -z "$BUNDLE_DIR" ]; then
            echo "❌ No bundle directory found" >&2
            exit 1
          fi

          echo "📦 Found bundle dir: $BUNDLE_DIR"

          APP_PATH=$(find "$BUNDLE_DIR" -name "*.app" -type d 2>/dev/null | head -1 || true)
          DMG_PATH=$(find "$BUNDLE_DIR" -name "*.dmg" -type f 2>/dev/null | head -1 || true)
          # Tauri updater artifacts: latest.json and signature file
          LATEST_JSON=$(find "$BUNDLE_DIR" -name "latest.json" -type f 2>/dev/null | head -1 || true)
          SIG_FILE=$(find "$BUNDLE_DIR" -name "*.dmg.sig" -type f 2>/dev/null | head -1 || true)

          if [ -z "$APP_PATH" ] && [ -z "$DMG_PATH" ]; then
            echo "❌ No macOS artifacts found in $BUNDLE_DIR" >&2
            exit 1
          fi

          # Copy .dmg if available
          if [ -n "$DMG_PATH" ]; then
            NEW_DMG="MCP_Manager-${VERSION}-macOS-${ARCH}.dmg"
            cp "$DMG_PATH" "release-assets/$NEW_DMG"
            echo "✅ macOS dmg ready: $NEW_DMG"
          fi

          # Copy latest.json if available
          if [ -n "$LATEST_JSON" ]; then
            cp "$LATEST_JSON" "release-assets/latest.json"
            echo "✅ latest.json ready"
          fi

          # Copy signature file if available
          if [ -n "$SIG_FILE" ]; then
            cp "$SIG_FILE" "release-assets/$(basename "$SIG_FILE")"
            echo "✅ signature file ready"
          fi

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos-aarch64
          path: release-assets/*
          if-no-files-found: warn

  release-windows:
    name: Build and Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION is $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Windows)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm tauri build --bundles msi

      - name: Prepare Windows Assets
        shell: pwsh
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            $dest = "MCP_Manager-$env:VERSION-Windows-x64.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "Windows msi ready: $dest"
          } else {
            Write-Warning 'No Windows MSI installer found'
          }

          # Tauri updater artifacts: latest.json and signature file
          $bundleDir = Get-ChildItem -Path 'src-tauri/target' -Name 'bundle' -Recurse -Directory | Select-Object -First 1
          if ($bundleDir) {
            $fullBundleDir = Join-Path 'src-tauri/target' $bundleDir
            $sigFile = Get-ChildItem -Path $fullBundleDir -Name '*.msi.sig' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($sigFile) {
              Copy-Item (Join-Path $fullBundleDir $sigFile) (Join-Path release-assets (Split-Path $sigFile -Leaf))
              Write-Host "Windows signature file ready"
            }
          }

          # Note: latest.json will be handled by macOS job to avoid conflicts

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows-x64
          path: release-assets/*
          if-no-files-found: warn

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [release-macos, release-windows]
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-macos-*
          path: release-assets
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-windows-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets || echo "No artifacts found"

      - name: Get Version
        id: get_version_release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version_release.outputs.VERSION }}
          name: MCP Manager v${{ steps.get_version_release.outputs.VERSION }}
          body: |
            ## MCP Manager v${{ steps.get_version_release.outputs.VERSION }}

            Universal MCP Server Manager for AI CLI tools.

            ### 🖥️ System Support

            | System | Status |
            |--------|--------|
            | **macOS 12+** | ✅ Supported |
            | **Windows 10+** | ✅ Supported |
            | **Linux** | 🚧 In Progress |

            ### 📥 Downloads

            - **macOS (Apple Silicon)**: `MCP_Manager-${{ steps.get_version_release.outputs.VERSION }}-macOS-aarch64.dmg`
            - **Windows (x64)**: `MCP_Manager-${{ steps.get_version_release.outputs.VERSION }}-Windows-x64.msi`

            ### ✨ Features

            - Unified management for 8+ AI CLI tools
            - JSON paste mode with smart parsing
            - Built-in connection testing
            - Real-time sync to configuration files
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
